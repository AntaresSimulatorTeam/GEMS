library:
  id: antares_legacy_models
  description: Antares historic model library
  version: "2.1.2"
  taxonomy: antares_legacy_taxonomy

  port-types:
    - id: flow
      description: A port that transfers power flow.
      fields:
        - id: flow
        - id: price
      area-connection:
        injection-to-balance: flow
        spillage-bound: flow
        unsupplied-energy-bound:

  models:
    - id: area
      taxonomy-category: balance
      parameters:
        - id: spillage_cost
        - id: unsupplied_energy_cost
      variables:
        - id: spilled_energy
          lower-bound: 0
          variable-type: continuous
        - id: unsupplied_energy
          lower-bound: 0
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      binding-constraints:
        - id: balance
          expression: sum_connections(balance_port.flow) = spilled_energy - unsupplied_energy
      port-field-definitions:
        - port: balance_port
          field: price
          definition: dual(balance)
      objective-contributions:
        - id: objective
          expression: sum(spillage_cost * spilled_energy + unsupplied_energy_cost * unsupplied_energy)
      extra-outputs:
        - id: price
          expression: dual(balance)
        - id: imbalance_cost
          expression: spillage_cost * spilled_energy + unsupplied_energy_cost * unsupplied_energy
        - id: is_loss_of_load
          expression: unsupplied_energy >= 0.000001
        - id: is_significant_loss_of_load
          expression: unsupplied_energy >= 0.5
        - id: is_near_loss_of_load
          expression: dual(balance) >= unsupplied_energy_cost - 5
      properties:
        - id: carrier

    - id: load
      taxonomy-category: fatal_consumption
      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -load
      extra-outputs:
        - id: actual_load
          expression: load
      properties:
        - id: carrier

    - id: link
      taxonomy-category: link
      parameters:
        - id: direct_capacity
          time-dependent: true
          scenario-dependent: true
        - id: indirect_capacity
          time-dependent: true
          scenario-dependent: true
        - id: direct_hurdle_cost
          time-dependent: true
          scenario-dependent: false
        - id: indirect_hurdle_cost
          time-dependent: true
          scenario-dependent: false
        - id: loop_flow
          time-dependent: true
          scenario-dependent: false
      variables:
        - id: direct_flow
          lower-bound: 0
          upper-bound: direct_capacity - loop_flow
          variable-type: continuous
        - id: indirect_flow
          lower-bound: 0
          upper-bound: indirect_capacity + loop_flow
          variable-type: continuous
        - id: flow
          variable-type: continuous
      ports:
        - id: out_port
          type: flow
        - id: in_port
          type: flow
      port-field-definitions:
        - port: out_port
          field: flow
          definition: flow
        - port: in_port
          field: flow
          definition: -flow
      objective-contributions:
        - id: objective
          expression: sum(direct_hurdle_cost * direct_flow + indirect_hurdle_cost * indirect_flow)
      constraints:
        - id: flow_decomposition
          expression: flow = direct_flow + loop_flow - indirect_flow
      extra-outputs:
        - id: minus_flow
          expression: -flow
        - id: abs_congestion_fee
          expression: max(flow,-flow) * max(sum_connections(out_port.price)-sum_connections(in_port.price),sum_connections(in_port.price)-sum_connections(out_port.price))
        - id: alg_congestion_fee
          expression: flow * (sum_connections(out_port.price)-sum_connections(in_port.price))
        - id: capacity_shadow_price
          expression: max(dual(flow_decomposition),-dual(flow_decomposition))
        - id: is_directly_congested
          expression: (flow >= direct_capacity)
        - id: is_indirectly_congested
          expression: (flow <= -indirect_capacity)
        - id: prop_cost
          expression: direct_hurdle_cost * direct_flow + indirect_hurdle_cost * indirect_flow
        - id: abs_flow
          expression: max(flow,-flow)
        - id: actual_loop_flow
          expression: loop_flow
      properties:
        - id: carrier

    - id: renewable
      taxonomy-category: renewable_fatal_generation
      parameters:
        - id: nominal_capacity
        - id: num_units
        - id: available_power
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: available_power
      extra-outputs:
        - id: minus_generation
          expression: -available_power
        - id: generation_power
          expression: available_power
      properties:
        - id: carrier
        - id: technology
    
    - id: miscellaneous_generation
      taxonomy-category: miscellaneous_fatal_generation
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: available_power
      extra-outputs:
        - id: minus_generation
          expression: -available_power
        - id: generation_power
          expression: available_power
      properties:
        - id: carrier
        - id: technology
        - id: miscellaneous_type

    - id: thermal
      taxonomy-category: dispatchable_generation
      parameters:
        - id: cluster_min_gen_modulation # Timeseries used to define the minimum generation of the cluster by cluster_min_gen_modulation * num_units * max_power_per_unit, this cannot exceed the maximum generation power cluster_max_generation (after being increased by min_power_per_unit). 
          scenario-dependent: true
          time-dependent: true
        - id: cluster_max_generation # Timeseries that takes outages into account. Used to define the number of available units, which is ceil(cluster_max_generation / max_power_per_unit). 
          scenario-dependent: true
          time-dependent: true
        - id: min_power_per_unit # Minimum generation per on unit. Used to increase cluster_max_generation so that it is at least equal to min_power_per_unit times the number of available units, which is ceil(cluster_max_generation / max_power_per_unit). This number of available units does not change when cluster_max_generation is increased because ceil((min_power_per_unit*ceil(cluster_max_generation / max_power_per_unit))/ (max_power_per_unit*(1-spinning/100)))=ceil(cluster_max_generation / max_power_per_unit) under the assumption that min_power_per_unit <= max_power_per_unit*(1-spinning/100).
        - id: max_power_per_unit
        - id: generation_cost
        - id: market_bid_cost
        - id: startup_cost
        - id: fixed_cost
        - id: min_up_duration
        - id: min_down_duration
        - id: num_units
        - id: spinning # in percentage, taken into account in cluster_max_generation and max_power_per_unit (except when computing minimum generation)
        - id: co2_emissions_rate
        - id: nh3_emissions_rate
        - id: so2_emissions_rate
        - id: nox_emissions_rate
        - id: pm2_5_emissions_rate
        - id: pm5_emissions_rate
        - id: pm10_emissions_rate
        - id: nmvoc_emissions_rate
        - id: op1_emissions_rate
        - id: op2_emissions_rate
        - id: op3_emissions_rate
        - id: op4_emissions_rate
        - id: op5_emissions_rate
      variables:
        - id: generation_power
          lower-bound: min(max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit)), cluster_min_gen_modulation * num_units * max_power_per_unit) # real expression before simplification : min(upper-bound(generation_power),cluster_min_gen_modulation * num_units * max_power_per_unit) = min(max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation*(1-spinning/100) / (max_power_per_unit*(1-spinning/100)))), cluster_min_gen_modulation * num_units * max_power_per_unit)
          upper-bound: max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit)) # real expression before simplification : max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation*(1-spinning/100) / (max_power_per_unit*(1-spinning/100))))
          variable-type: continuous
        - id: num_units_on
          lower-bound: ceil(min(cluster_max_generation/max_power_per_unit, cluster_min_gen_modulation * num_units * max_power_per_unit/(max_power_per_unit*(1-spinning/100)))) # real expression before simplification : ceil(lower-bound(generation_power)/(max_power_per_unit*(1-spinning/100))) = ceil(min(max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit)), cluster_min_gen_modulation * num_units * max_power_per_unit)/(max_power_per_unit*(1-spinning/100)))
          upper-bound: ceil(cluster_max_generation/max_power_per_unit) # real expression before simplification : ceil(upper-bound(generation_power)/(max_power_per_unit*(1-spinning/100))) = ceil(max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation*(1-spinning/100) / (max_power_per_unit*(1-spinning/100))))/(max_power_per_unit*(1-spinning/100)))
          variable-type: continuous #integer
        - id: num_units_starting
          lower-bound: 0
          variable-type: continuous #integer
        - id: num_units_stopping
          lower-bound: 0
          variable-type: continuous #integer
        - id: num_units_failing
          lower-bound: 0
          upper-bound: max(0, (ceil(cluster_max_generation/max_power_per_unit))[t-1] - (ceil(cluster_max_generation/max_power_per_unit)))
          variable-type: continuous #integer
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: generation_power
      constraints:
        - id: max_generation
          expression: generation_power <= num_units_on * max_power_per_unit*(1-spinning/100)
        - id: min_generation
          expression: generation_power >= num_units_on * min_power_per_unit
        - id: on_units_dynamics
          expression: num_units_on = num_units_on[t-1] + num_units_starting - num_units_stopping
        - id: num_units_failing_lower_than_stopping
          expression: num_units_failing <= num_units_stopping
        - id: min_up_duration_cst
          expression: sum(t-min_up_duration + 1 .. t, num_units_starting - num_units_failing) <= num_units_on
        - id: min_down_duration_cst
          expression: sum(t-min_down_duration + 1 .. t, num_units_stopping) <= ((ceil(cluster_max_generation/max_power_per_unit)))[t-min_down_duration] - num_units_on + sum(t-min_down_duration + 1 .. t, max(0, ceil(cluster_max_generation/max_power_per_unit) - (ceil(cluster_max_generation/max_power_per_unit))[t-1]))
      objective-contributions:
        - id: objective
          expression: sum(market_bid_cost * generation_power + startup_cost * num_units_starting + fixed_cost * num_units_on)
      properties:
        - id: carrier
        - id: technology
      extra-outputs:
        - id: actual_num_units_on
          expression: ceil(num_units_on)
        - id: prop_cost
          expression: generation_cost * generation_power
        - id: non_prop_cost
          expression: startup_cost * max(0,ceil(num_units_on)-(ceil(num_units_on))[t-1])+ fixed_cost * ceil(num_units_on)
        - id: cluster_availability
          expression: max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit))
        - id: min_gen_power
          expression: min(generation_power, cluster_min_gen_modulation * num_units * max_power_per_unit)
        - id: up_margin
          expression: max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit)) - generation_power
        - id: down_margin
          expression: generation_power - min(max(cluster_max_generation*(1-spinning/100), min_power_per_unit * ceil(cluster_max_generation / max_power_per_unit)), cluster_min_gen_modulation * num_units * max_power_per_unit)
        - id: co2_emissions
          expression: generation_power * co2_emissions_rate
        - id: nh3_emissions
          expression: generation_power * nh3_emissions_rate
        - id: so2_emissions
          expression: generation_power * so2_emissions_rate
        - id: nox_emissions
          expression: generation_power * nox_emissions_rate
        - id: pm2_5_emissions
          expression: generation_power * pm2_5_emissions_rate
        - id: pm5_emissions
          expression: generation_power * pm5_emissions_rate
        - id: pm10_emissions
          expression: generation_power * pm10_emissions_rate
        - id: nmvoc_emissions
          expression: generation_power * nmvoc_emissions_rate
        - id: op1_emissions
          expression: generation_power * op1_emissions_rate
        - id: op2_emissions
          expression: generation_power * op2_emissions_rate
        - id: op3_emissions
          expression: generation_power * op3_emissions_rate
        - id: op4_emissions
          expression: generation_power * op4_emissions_rate
        - id: op5_emissions
          expression: generation_power * op5_emissions_rate
        - id: profit
          expression: (sum_connections(balance_port.price) - generation_cost)* max(generation_power - cluster_min_gen_modulation * num_units * max_power_per_unit, 0)

    - id: short_term_storage
      taxonomy-category: short_term_storage
      parameters:
        - id: reservoir_capacity
          time-dependent: false
          scenario-dependent: false
        - id: nominal_injection_capacity
          time-dependent: false
          scenario-dependent: false
        - id: nominal_withdrawal_capacity
          time-dependent: false
          scenario-dependent: false
        - id: injection_efficiency
          time-dependent: false
          scenario-dependent: false
        - id: withdrawal_efficiency
          time-dependent: false
          scenario-dependent: false
        - id: lower_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: upper_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: max_injection_modulation
          time-dependent: true
          scenario-dependent: true
        - id: max_withdrawal_modulation
          time-dependent: true
          scenario-dependent: true
        - id: inflows
          time-dependent: true
          scenario-dependent: true
        - id: initial_level
          time-dependent: false
          scenario-dependent: true
        - id: injection_cost
          time-dependent: true
          scenario-dependent: true
        - id: withdrawal_cost
          time-dependent: true
          scenario-dependent: true
        - id: level_cost
          time-dependent: true
          scenario-dependent: true
        - id: is_overflow_allowed
          time-dependent: false
          scenario-dependent: false
        - id: is_injection_variation_penalized
          time-dependent: false
          scenario-dependent: false
        - id: is_withdrawal_variation_penalized
          time-dependent: false
          scenario-dependent: false
        - id: injection_variation_penalty
          time-dependent: true
          scenario-dependent: true
        - id: withdrawal_variation_penalty
          time-dependent: true
          scenario-dependent: true
        - id: overflow_cost
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: injection_power
          lower-bound: 0
          upper-bound: max_injection_modulation * nominal_injection_capacity
          variable-type: continuous
        - id: withdrawal_power
          lower-bound: 0
          upper-bound: max_withdrawal_modulation * nominal_withdrawal_capacity
          variable-type: continuous
        - id: level
          lower-bound: lower_rule_curve * reservoir_capacity
          upper-bound: upper_rule_curve * reservoir_capacity
          variable-type: continuous
        - id: overflow
          lower-bound: 0
          upper-bound: reservoir_capacity * is_overflow_allowed
          variable-type: continuous
        - id: injection_variation
          lower-bound: 0
          variable-type: continuous
        - id: withdrawal_variation
          lower-bound: 0
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: withdrawal_power - injection_power
      constraints:
        - id: initial_level_constraint
          expression: level[167] = initial_level * reservoir_capacity # 167 = last timestep of the week (168h - 1); enforces end-of-week level target
        - id: level_equation
          expression: level = level[t-1] + injection_efficiency * injection_power - withdrawal_efficiency * withdrawal_power + inflows - overflow
        - id: up_injection_variation
          expression: injection_variation >= injection_power[t+1] - injection_power
        - id: down_injection_variation
          expression: injection_variation >= injection_power - injection_power[t+1] 
        - id: up_withdrawal_variation
          expression: withdrawal_variation >= withdrawal_power[t+1] - withdrawal_power
        - id: down_withdrawal_variation
          expression: withdrawal_variation >= withdrawal_power - withdrawal_power[t+1] 
      objective-contributions:
        - id: objective
          expression: sum(injection_cost * injection_power + withdrawal_cost * withdrawal_power + level_cost * level + injection_variation_penalty * injection_variation * is_injection_variation_penalized + withdrawal_variation_penalty * withdrawal_variation * is_withdrawal_variation_penalized + overflow_cost * overflow * is_overflow_allowed)
      extra-outputs:
        - id: profit
          expression: floor((withdrawal_power - injection_power) * sum_connections(balance_port.price)+0.5)
      properties:
        - id: carrier
        - id: group
    
    - id: long_term_storage
      taxonomy-category: long_term_storage
      parameters:
        - id: reservoir_capacity
          time-dependent: false
          scenario-dependent: false
        - id: nominal_pumping_capacity
          time-dependent: true
          scenario-dependent: true
        - id: nominal_generation_capacity
          time-dependent: true
          scenario-dependent: true
        - id: minimum_generation
          time-dependent: true
          scenario-dependent: true
        - id: pumping_efficiency
          time-dependent: false
          scenario-dependent: false
        - id: lower_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: upper_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: inflows
          time-dependent: true
          scenario-dependent: true
        - id: initial_and_final_level
          time-dependent: true
          scenario-dependent: true
        - id: overflow_cost
          time-dependent: true
          scenario-dependent: true
      variables:
        - id: injection_power
          lower-bound: 0
          upper-bound: nominal_pumping_capacity
          variable-type: continuous
        - id: withdrawal_power
          lower-bound: minimum_generation
          upper-bound: nominal_generation_capacity
          variable-type: continuous
        - id: overflow
          lower-bound: 0
          upper-bound: inflows
          variable-type: continuous
        - id: level
          lower-bound: 0
          upper-bound: reservoir_capacity
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: withdrawal_power - injection_power
      constraints:
        - id: level_equation
          expression: level = level[t-1] + pumping_efficiency * injection_power + inflows - withdrawal_power - overflow
        - id: initial_level_equation
          expression: level[0] = initial_and_final_level[0] * reservoir_capacity + pumping_efficiency * injection_power[0] + inflows[0] - withdrawal_power[0] - overflow[0]
        - id: final_level_equation
          expression: initial_and_final_level[167] * reservoir_capacity = level[167] # 167 = last timestep of the week (168h - 1)
      objective-contributions:
        - id: objective
          expression: sum(overflow_cost * overflow -0.000001*level)
      extra-outputs:
        - id: level_percentage
          expression: level/reservoir_capacity*100
        - id: actual_inflows
          expression: floor(inflows+0.5)
      properties:
        - id: carrier