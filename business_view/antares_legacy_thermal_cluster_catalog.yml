catalog:

  # TO DO : this catalog should be improved, correctness of the Metrics should be checked
  
  id: antares_thermal_cluster_output

  taxonomy: my_taxonomy

  location:
    taxonomy-category: dispatchable_production

  metrics-definition: 

  - id: DTG.BY.CLUSTER
    terms:
      - taxonomy-category: dispatchable_production
        output-id: generation
        location-ports: null
    terms-operator: sum
    time-operator: sum

  - id: MIN.DTG.BY.CLUSTER
    terms:
      - taxonomy-category: dispatchable_production
        output-id: p_min_cluster * unit_count * min_stable_power #incorrect -> to be changed
        location-ports: null
    terms-operator: sum
    time-operator: sum

  - id: PROFIT.BY.CLUSTER
    terms:
      - taxonomy-category: dispatchable_production
        output-id: profit # as for the congestion fees, we need to clarify first the GEMS grammar to get the price of the zone in the prod component.
        location-ports: null
    terms-operator: sum
    time-operator: sum

  - id: NODU.BY.PLANT # Not quite sure this is right approach ?
    terms:
      - taxonomy-category: dispatchable_production
        output-id: nb_units_on
        location-ports: null
    terms-operator: sum
    time-operator: sum

  - id: NP.COST.BY.CLUSTER # Not quite sure this is right approach ?
    terms:
      - taxonomy-category: dispatchable_production
        output-id: non_proportional_cost
        location-ports: null
    terms-operator: sum
    time-operator: sum
