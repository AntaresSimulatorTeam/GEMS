



library:
  id: antares_reserves_models
  description: Andromede Project V1 reserves model library

  port-types:
    - id: flow
      fields:
        - id: flow
      area-connection:
        - injection-field: flow


  models:

    - id: bus
      parameters:
        - id: spillage_cost
        - id: unsupplied_energy_cost
      variables:
        - id: spillage
          lower-bound: 0
          variable-type: continuous
        - id: unsupplied_energy
          lower-bound: 0
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
      binding-constraints:
        - id: balance
          expression: sum_connections(balance_port.flow) = spillage - unsupplied_energy
      objective-contributions:
        - id: objective
          expression: sum(spillage_cost * spillage + unsupplied_energy_cost * unsupplied_energy)


    - id: bus_reserve
      parameters:
        - id: spillage_reserve_cost
          time-dependent: true
          scenario-dependent: true
        - id: unsupplied_reserve_cost
          time-dependent: true
          scenario-dependent: true
        - id: mean_activation
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: spillage
          lower-bound: 0
          variable-type: continuous
        - id: unsupplied_reserve
          lower-bound: 0
          variable-type: continuous
      ports:
        - id: balance_port_reserve
          type: flow
        - id: mean_activation_port
          type: flow
      port-field-definitions:
        - port: mean_activation_port
          field: flow
          definition: mean_activation
      binding-constraints:
        - id: balance
          expression: sum_connections(balance_port_reserve.flow) = spillage - unsupplied_reserve
      objective-contributions:
        - id: objective
          expression: sum(spillage_reserve_cost * spillage + unsupplied_reserve_cost * unsupplied_reserve)


    - id: reserve_demand
      parameters:
        - id: reserve_demand
          time-dependent: true
          scenario-dependent: true
      ports:
        - id: balance_port_reserve
          type: flow
      port-field-definitions:
        - port: balance_port_reserve
          field: flow
          definition: -reserve_demand

  
    - id: thermal
      parameters:
        - id: p_min_cluster
          scenario-dependent: true
          time-dependent: true
        - id: p_max_cluster # timeseries that takes outages into account
          scenario-dependent: true
          time-dependent: true
        - id: p_min_unit
        - id: p_max_unit
        - id: generation_cost
        - id: startup_cost
        - id: fixed_cost
        - id: d_min_up
        - id: d_min_down
        - id: nb_units_min # Equals to ceil(p_min_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: true
          time-dependent: true
        - id: nb_units_max # Equals to ceil(p_max_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: true
          time-dependent: true
        - id: nb_units_max_variation_forward
          scenario-dependent: true
          time-dependent: true
        - id: nb_units_max_variation_backward
          scenario-dependent: true
          time-dependent: true
        - id: reserve_1_participation_on_max
          scenario-dependent: true
          time-dependent: true
        - id: reserve_1_participation_off_max
          scenario-dependent: true
          time-dependent: true
        - id: reserve_2_participation_on_max
          scenario-dependent: true
          time-dependent: true
        - id: reserve_1_on_cost
          scenario-dependent: true
          time-dependent: true
        - id: reserve_1_off_cost
          scenario-dependent: true
          time-dependent: true
        - id: reserve_2_on_cost
          scenario-dependent: true
          time-dependent: true
      variables:
        - id: generation
          lower-bound: p_min_cluster
          upper-bound: p_max_cluster
          variable-type: continuous
        - id: nb_units_on
          lower-bound: nb_units_min
          upper-bound: nb_units_max
          variable-type: integer
        - id: nb_starting
          lower-bound: 0
          upper-bound: nb_units_max
          variable-type: integer
        - id: nb_stopping
          lower-bound: 0
          upper-bound: nb_units_max
          variable-type: integer
        - id: nb_failing
          lower-bound: 0
          upper-bound: nb_units_max
          variable-type: integer
        - id: reserve_1_participation_on
          lower-bound: 0
          variable-type: continuous
        - id: reserve_1_participation_off
          lower-bound: 0
          variable-type: continuous
        - id: reserve_2_participation_on
          lower-bound: 0
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
        - id: balance_port_reserve_1
          type: flow
        - id: balance_port_reserve_2
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: generation
        - port: balance_port_reserve_1
          field: flow
          definition: reserve_1_participation_off + reserve_1_participation_on
        - port: balance_port_reserve_2
          field: flow
          definition: reserve_2_participation_on
      constraints:
        - id: max_generation
          expression: generation <= nb_units_on * p_max_unit
        - id: min_generation
          expression: generation >= nb_units_on * p_min_unit
        - id: on_units_dynamics
          expression: nb_units_on = nb_units_on[t-1] + nb_starting - nb_stopping
        - id: nb_failing_lower_than_stopping
          expression: nb_failing <= nb_stopping
        - id: nb_failing_lower_than_max_variation
          expression: nb_failing <= nb_units_max_variation_forward
        - id: min_up_duration
          expression: sum(t-d_min_up + 1 .. t, nb_starting - nb_failing) <= nb_units_on
        - id: min_down_duration
          expression: sum(t-d_min_down + 1 .. t, nb_stopping) <= nb_units_max[t-d_min_down] - nb_units_on + sum(t-d_min_down + 1 .. t, nb_units_max_variation_backward)
        # Contraintes physique
        - id: reserve_1_participation_max_on
          expression: reserve_1_participation_on <= nb_units_on * reserve_1_participation_on_max
        - id: reserve_1_participation_max_off
          expression: reserve_1_participation_off <= (nb_units_max - nb_units_on) * reserve_1_participation_off_max
        - id: reserve_2_participation_max_on
          expression: reserve_2_participation_on <= nb_units_on * reserve_2_participation_on_max
        #Contraintes repartition eod/reserves
        - id: reserve_constraints_down_1
          expression: nb_units_on *p_min_unit  + reserve_2_participation_on <= generation
        - id: reserve_constraints_down_2
          expression: p_min_cluster  + reserve_2_participation_on <= generation
        - id: reserve_constraints_up_1
          expression:  generation + reserve_1_participation_on <= nb_units_on *p_max_unit 
        - id: reserve_constraints_up_2
          expression:  generation + reserve_1_participation_on <=  p_max_cluster 
          # s'il y a plusieurs réserves, on veut sommer la participation de toutes les réserves up
        # ajout des symetries
        - id: symetry
          expression:  reserve_2_participation_on / reserve_2_participation_on_max = reserve_1_participation_on / reserve_1_participation_on_max
      objective-contributions:
        - id: objective
          expression: sum(generation_cost * generation + startup_cost * nb_starting + fixed_cost * nb_units_on + reserve_1_participation_on * reserve_1_on_cost + reserve_2_participation_on * reserve_2_on_cost + reserve_1_participation_off * reserve_1_off_cost)





    - id: short-term-storage
      parameters:
        - id: reservoir_capacity
          time-dependent: false
          scenario-dependent: false
        - id: injection_nominal_capacity
          time-dependent: false
          scenario-dependent: false
        - id: withdrawal_nominal_capacity
          time-dependent: false
          scenario-dependent: false
        - id: efficiency_injection
          time-dependent: false
          scenario-dependent: false
        - id: efficiency_withdrawal
          time-dependent: false
          scenario-dependent: false
        - id: lower_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: upper_rule_curve
          time-dependent: true
          scenario-dependent: true
        - id: p_max_injection_modulation
          time-dependent: true
          scenario-dependent: true
        - id: p_max_withdrawal_modulation
          time-dependent: true
          scenario-dependent: true
        - id: inflows
          time-dependent: true
          scenario-dependent: true
        - id: initial_level
          time-dependent: false
          scenario-dependent: true
        - id: reserve_1_participation_max_injection
          time-dependent: false
          scenario-dependent: false
        - id: reserve_1_participation_max_withdrawal
          time-dependent: false
          scenario-dependent: false
        - id: reserve_2_participation_max_injection
          time-dependent: false
          scenario-dependent: false
        - id: reserve_2_participation_max_withdrawal
          time-dependent: false
          scenario-dependent: false
        - id: reserve_1_cost
          time-dependent: false
          scenario-dependent: false
        - id: reserve_2_cost
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: p_injection
          lower-bound: 0
          upper-bound: p_max_injection_modulation * injection_nominal_capacity
          variable-type: continuous
        - id: p_withdrawal
          lower-bound: 0
          upper-bound: p_max_withdrawal_modulation * withdrawal_nominal_capacity
          variable-type: continuous
        - id: level
          lower-bound: lower_rule_curve * reservoir_capacity
          upper-bound: upper_rule_curve * reservoir_capacity
          variable-type: continuous
        - id: reserve_1_participation_injection
          lower-bound: 0
          upper-bound: reserve_1_participation_max_injection
          variable-type: continuous
        - id: reserve_1_participation_withdrawal
          lower-bound: 0
          upper-bound: reserve_1_participation_max_withdrawal
          variable-type: continuous
        - id: reserve_2_participation_injection
          lower-bound: 0
          upper-bound: reserve_2_participation_max_injection
          variable-type: continuous
        - id: reserve_2_participation_withdrawal
          lower-bound: 0
          upper-bound: reserve_2_participation_max_withdrawal
          variable-type: continuous
      ports:
        - id: balance_port
          type: flow
        - id: mean_activation_reserve_1_port
          type: flow
        - id: mean_activation_reserve_2_port
          type: flow
        - id: balance_port_reserve_1
          type: flow
        - id: balance_port_reserve_2
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: p_withdrawal - p_injection
        - port: balance_port_reserve_1
          field: flow
          definition: reserve_1_participation_withdrawal + reserve_1_participation_injection
        - port: balance_port_reserve_2
          field: flow
          definition: reserve_2_participation_withdrawal + reserve_2_participation_injection
      objective-contributions:
        - id: objective
          expression: sum( reserve_1_cost *(reserve_1_participation_withdrawal + reserve_1_participation_injection) + reserve_2_cost *(reserve_2_participation_withdrawal + reserve_2_participation_injection) )
      binding-constraints:
        - id: initial_level_constraint
          expression: level[0] = initial_level * reservoir_capacity
        - id: level_dynamic_constraint
          expression: level[t+1] = level + efficiency_injection * p_injection - efficiency_withdrawal * p_withdrawal + inflows
        - id: reserve_up_constraint_withdrawal_sup
          expression: p_withdrawal  <= p_max_withdrawal_modulation * withdrawal_nominal_capacity - reserve_1_participation_withdrawal
        - id: reserve_down_constraint_withdrawal_inf
          expression: p_withdrawal >=  reserve_2_participation_withdrawal
        - id: reserve_up_constraint_injection_sup
          expression: p_injection <= p_max_injection_modulation * injection_nominal_capacity - reserve_2_participation_injection
        - id: reserve_down_constraint_injection_inf
          expression: p_injection >=  reserve_1_participation_injection
        - id: activation_reserve_up_stock_constraint
          expression: sum_connections(mean_activation_reserve_1_port.flow) * (reserve_2_participation_withdrawal + reserve_2_participation_injection) <= reservoir_capacity- level
        - id: activation_reserve_down_stock_constraint
          expression: sum_connections(mean_activation_reserve_2_port.flow) * (reserve_1_participation_withdrawal + reserve_1_participation_injection) <= level 
