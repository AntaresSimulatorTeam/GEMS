## pour les lignes HVAC en RE, je ne peux pas mettre dans la fonction objectif les coûts asscociés
## au flux liés à l'utilisation de la HVDC. Je dois donc faire un port qui envoie le hurdle cost des lignes HVAC
## aux lignes HVDC





system:
  id: system
  components:
    - id: bus1
      model: antares_legacy_models.area

      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: ens_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000

    - id: load_bus
      model: antares_legacy_models.load

      parameters:
        - id: load
          time-dependent: false
          scenario-dependent: false
          value: 100

    - id: th1
      model: antares_legacy_models.thermal

      parameters:
        - id: p_min_cluster
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: p_max_cluster
          scenario-dependent: false
          time-dependent: false
          value: 200
        - id: p_min_unit
          scenario-dependent: false
          time-dependent: false
          value: 50
        - id: p_max_unit
          scenario-dependent: false
          time-dependent: false
          value: 100
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value: 3
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_up
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_down
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_min # Equals to ceil(p_min_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_max # Equals to ceil(p_max_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: nb_units_max_variation_forward
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: nb_units_max_variation_backward
          scenario-dependent: false
          time-dependent: false
          value : 2

    - id: th2
      model: antares_legacy_models.thermal

      parameters:
        - id: p_min_cluster
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: p_max_cluster
          scenario-dependent: false
          time-dependent: false
          value: 200
        - id: p_min_unit
          scenario-dependent: false
          time-dependent: false
          value: 50
        - id: p_max_unit
          scenario-dependent: false
          time-dependent: false
          value: 100
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value: 30
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_up
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_down
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_min # Equals to ceil(p_min_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_max # Equals to ceil(p_max_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: nb_units_max_variation_forward
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: nb_units_max_variation_backward
          scenario-dependent: false
          time-dependent: false
          value : 2
    

  connections:

    - component1: bus1
      component2: load_bus
      port1: balance_port
      port2: balance_port
    - component1: bus1
      component2: th1
      port1: balance_port
      port2: balance_port
    - component1: bus1
      component2: th2
      port1: balance_port
      port2: balance_port
