## pour les lignes HVAC en RE, je ne peux pas mettre dans la fonction objectif les coûts asscociés
## au flux liés à l'utilisation de la HVDC. Je dois donc faire un port qui envoie le hurdle cost des lignes HVAC
## aux lignes HVDC




system:
  id: system
  components:



    - id: bus1
      model: antares_reserves_models.bus

      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000

    - id: bus2
      model: antares_reserves_models.bus

      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000


    - id: bus3
      model: antares_reserves_models.bus

      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000



    - id: link23
      model: antares_reserves_models.link

      parameters:
        - id: capacity_direct
          time-dependent: true
          scenario-dependent: true
          value: 100
        - id: capacity_indirect
          time-dependent: true
          scenario-dependent: true
          value: 100
        - id: flow_direct_hurdle_cost
          time-dependent: true
          scenario-dependent: true
          value: 0
        - id: flow_indirect_hurdle_cost
          time-dependent: true
          scenario-dependent: true
          value: 0






    - id: bus_reserve_1_zone12
      model: antares_reserves_models.bus_reserve

      parameters:
        - id: spillage_reserve_cost
          time-dependent: false
          scenario-dependent: false
          value: 100
        - id: unsupplied_reserve_cost
          time-dependent: false
          scenario-dependent: false
          value: 100
        - id: mean_activation
          time-dependent: false
          scenario-dependent: false
          value: 0


    - id: bus_reserve_1_zone3
      model: antares_reserves_models.bus_reserve

      parameters:
        - id: spillage_reserve_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: unsupplied_reserve_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: mean_activation
          time-dependent: false
          scenario-dependent: false
          value: 0



    - id: reserve_1_demand_zone12
      model: antares_reserves_models.reserve_demand

      parameters:
        - id: reserve_demand
          time-dependent: false
          scenario-dependent: false
          value: 100


    - id: reserve_1_demand_zone3
      model: antares_reserves_models.reserve_demand

      parameters:
        - id: reserve_demand
          time-dependent: false
          scenario-dependent: false
          value: 200


    - id: load_bus
      model: antares_legacy_models.load

      parameters:
        - id: load
          time-dependent: false
          scenario-dependent: false
          value: 100


    - id: th1
      model: antares_reserves_models.thermal

      parameters:
        - id: p_min_cluster
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: p_max_cluster
          scenario-dependent: false
          time-dependent: false
          value: 400
        - id: p_min_unit
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: p_max_unit
          scenario-dependent: false
          time-dependent: false
          value: 100
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value: 10
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_up
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_down
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_min # Equals to ceil(p_min_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: nb_units_max # Equals to ceil(p_max_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: false
          time-dependent: false
          value: 4
        - id: nb_units_max_variation_forward
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: nb_units_max_variation_backward
          scenario-dependent: false
          time-dependent: false
          value: 2
        - id: reserve_1_participation_on_max
          scenario-dependent: false
          time-dependent: false
          value : 10
        - id: reserve_1_participation_off_max
          scenario-dependent: false
          time-dependent: false
          value : 0
        - id: reserve_1_on_cost
          scenario-dependent: false
          time-dependent: false
          value : 1
        - id: reserve_1_off_cost
          scenario-dependent: false
          time-dependent: false
          value : 0







  connections:

    - component1: bus1
      component2: load_bus
      port1: balance_port
      port2: balance_port

    - component1: bus1
      component2: th1
      port1: balance_port
      port2: balance_port

    - component1: bus2
      component2: link23
      port1: balance_port
      port2: in_port






    - component1: link23
      component2: bus3
      port1: out_port
      port2: balance_port





    - component1: bus_reserve_1_zone12
      component2: reserve_1_demand_zone12
      port1: balance_port_reserve
      port2: balance_port_reserve
  
    - component1: bus_reserve_1_zone3
      component2: reserve_1_demand_zone3
      port1: balance_port_reserve
      port2: balance_port_reserve






    - component1: bus_reserve_1
      component2: short-term-storage_1
      port1: balance_port_reserve
      port2: balance_port_reserve_1

    - component1: bus_reserve_2
      component2: short-term-storage_1
      port1: balance_port_reserve
      port2: balance_port_reserve_2


    - component1: bus_reserve_1
      component2: short-term-storage_1
      port1: mean_activation_port
      port2: mean_activation_reserve_1_port

    - component1: bus_reserve_2
      component2: short-term-storage_1
      port1: mean_activation_port
      port2: mean_activation_reserve_2_port
