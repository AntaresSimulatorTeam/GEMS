sections:
  - title: "Basic Configuration"
    content: |
      This file defines the default parameters.
      Values must be modified manually.

      Main parameters:
        - database_host: localhost
        - database_port: 5432
        - debug_mode: false
        - log_level: info

  - title: "Advanced Options"
    content: |
      Advanced options are reserved for expert users.
      Use with caution.

      Advanced options:
        - enable_caching: true
        - cache_ttl: 3600
        - max_connections: 100
        - timeout_seconds: 30
        - enable_compression: true

  - title: "Network Configuration"
    content: |
      Network and communication parameters.

      Network:
        - server_address: 0.0.0.0
        - api_port: 8080
        - websocket_port: 8081
        - ssl_enabled: true
        - certificate_path: /path/to/cert.pem

  - title: "Additional Documentation"
    content: |
      For more information, please refer to the official documentation.

      Resources:
        - Main documentation: https://docs.example.com
        - User guide: https://docs.example.com/guide
        - API Reference: https://api.example.com/docs
        - Community support: https://github.com/example/repo/discussions
