system:
  id: system
  components:
    - id: bus1
      model: antares_legacy_models.area

      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000

    - id: load_bus
      model: antares_legacy_models.load

      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
          value: load

    - id: thermal_plant
      model: antares_legacy_models.thermal
      parameters:
        - id: min_power_per_unit
          time-dependent: false
          scenario-dependent: false
          value: 3
        - id: max_power_per_unit
          time-dependent: false
          scenario-dependent: false
          value: 10
        - id: generation_cost
          time-dependent: false
          scenario-dependent: false
          value: 30
        - id: market_bid_cost
          time-dependent: false
          scenario-dependent: false
          value: 30
        - id: startup_cost
          time-dependent: false
          scenario-dependent: false
          value: 1000
        - id: fixed_cost
          time-dependent: false
          scenario-dependent: false
          value: 100
        - id: min_up_duration
          time-dependent: false
          scenario-dependent: false
          value: 12
        - id: min_down_duration
          time-dependent: false
          scenario-dependent: false
          value: 12
        - id: cluster_max_generation
          time-dependent: false
          scenario-dependent: false
          value: 100
        - id: num_units
          time-dependent: false
          scenario-dependent: false
          value: 10
        - id: spinning
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: cluster_min_gen_modulation
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: co2_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: nh3_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: so2_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: nox_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: pm2_5_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: pm5_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: pm10_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: nmvoc_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: op1_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: op2_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: op3_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: op4_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: op5_emissions_rate
          time-dependent: false
          scenario-dependent: false
          value: 0

    - id: solar_farm
      model: antares_legacy_models.renewable
      parameters:
        - id: nominal_capacity
          time-dependent: false
          scenario-dependent: false
          value: 50
        - id: num_units
          time-dependent: false
          scenario-dependent: false
          value: 1
        - id: available_power
          time-dependent: true
          scenario-dependent: true
          value: solar

    - id: wind_farm
      model: antares_legacy_models.renewable
      parameters:
        - id: nominal_capacity
          time-dependent: false
          scenario-dependent: false
          value: 35
        - id: num_units
          time-dependent: false
          scenario-dependent: false
          value: 1
        - id: available_power
          time-dependent: true
          scenario-dependent: true
          value: wind


  connections:

    - component1: bus1
      component2: load_bus
      port1: balance_port
      port2: balance_port
    - component1: bus1
      component2: thermal_plant
      port1: balance_port
      port2: balance_port
    - component1: bus1
      component2: solar_farm
      port1: balance_port
      port2: balance_port
    - component1: bus1
      component2: wind_farm
      port1: balance_port
      port2: balance_port
