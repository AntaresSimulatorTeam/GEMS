name: End-to-End Tests

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Antares v10.0.0 release
      run: |
        echo "Downloading Antares v10.0.0..."
        curl -L -f -o antares-10.0.0-Ubuntu-22.04.tar.gz \
          https://github.com/AntaresSimulatorTeam/Antares_Simulator/releases/download/v10.0.0/antares-10.0.0-Ubuntu-22.04.tar.gz

        if [ ! -f "antares-10.0.0-Ubuntu-22.04.tar.gz" ]; then
          echo "Error: Download failed"
          exit 1
        fi

        echo "Download successful. File size: $(ls -lh antares-10.0.0-Ubuntu-22.04.tar.gz | awk '{print $5}')"

    - name: Extract Antares binaries
      run: |
        echo "Extracting archive..."
        tar -xzf antares-10.0.0-Ubuntu-22.04.tar.gz --strip-components=1 --one-top-level=antares-10.0.0-Ubuntu-22.04

    - name: Run end-to-end tests
      run: |
        python -m pytest tests/e2e_tests -v

    - name: Cleanup
      if: always()
      run: |
        rm -f antares-10.0.0-Ubuntu-22.04.tar.gz
        rm -rf antares-10.0.0-Ubuntu-22.04
        echo "Cleanup completed"
