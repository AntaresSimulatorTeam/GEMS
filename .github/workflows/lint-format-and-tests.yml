name: Lint, Format and Tests

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  lint:
    name: Lint and format checks
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: uv sync --frozen --group dev

      - name: Lint with ruff
        run: uv run ruff check tests/

      - name: Check formatting with ruff
        run: uv run ruff format --check tests/

      - name: Type check with mypy
        run: uv run mypy

      - name: Lint YAML files
        run: uv run yamllint -c .yamllint.yml libraries/ resources/ .github/workflows/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen --only-group test

      - name: Run unit tests
        run: uv run python -m pytest tests/unit_tests -v
