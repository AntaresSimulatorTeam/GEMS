name: Process Change
description: Propose or track a change governed by a GEMS process (DOC-01, DOC-02, LT-01, LT-02, LT-03)
title: "[PROCESS] "
labels: ["process-change"]
body:
  - type: dropdown
    id: process_id
    attributes:
      label: Process ID
      description: Which governance process does this change fall under?
      options:
        - DOC-01 — Antares evolution impact on GEMS Language
        - DOC-02 — Internal documentation improvement
        - LT-01 — Antares evolution impact on libraries
        - LT-02 — Internal library or taxonomy development
        - LT-03 — New library or taxonomy
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What change is being proposed and why?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Analysis
      description: |
        Which libraries, models, studies, or documentation sections are affected?
        Are there breaking changes to existing studies?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Library YAML updated
        - [ ] Version file bumped (`versions/<library>.txt`)
        - [ ] Changelog entry added (`libraries/CHANGELOG-<library>.md`)
        - [ ] GEMS Language changelog updated if language-level change (`CHANGELOG-gems-language.md`)
        - [ ] Compatibility matrix updated if applicable (`COMPATIBILITY.md`)
        - [ ] Documentation updated
        - [ ] Tests added or updated
