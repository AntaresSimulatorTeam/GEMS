name: "DOC-01 — Antares evolution impact on GEMS Language"
description: Track GEMS Language documentation updates triggered by a new Antares-Simulator/Modeler release
title: "[DOC-01] Antares v — GEMS Language impact"
labels: ["DOC-01", "antares-update"]
body:
  - type: markdown
    attributes:
      value: |
        **Process DOC-01** — Triggered by a new Antares-Simulator/Modeler release that affects the GEMS Language definition, modeler API, or documented behavior.

  - type: input
    id: antares_new_version
    attributes:
      label: New Antares Version
      placeholder: "e.g. 9.4.0"
    validations:
      required: true

  - type: input
    id: antares_previous_version
    attributes:
      label: Previous Tracked Version
      placeholder: "e.g. 9.3.2"
    validations:
      required: true

  - type: textarea
    id: trigger
    attributes:
      label: Trigger Description
      description: What changed in the new Antares release that affects the GEMS Language? Reference the release notes or changelog.
    validations:
      required: true

  - type: textarea
    id: language_impact
    attributes:
      label: Impact on GEMS Language
      description: |
        Describe the impact on GEMS Language syntax, semantics, or documented behavior.
        Are there new features, deprecated constructs, or breaking changes?
    validations:
      required: true

  - type: textarea
    id: examples_impact
    attributes:
      label: Impact on Documentation Examples
      description: Are the Quick Start Examples (QSE_1_Adequacy, QSE_2_Unit_Commitment) or other documented studies affected?

  - type: textarea
    id: validation_strategy
    attributes:
      label: Validation Strategy
      description: How will correctness be validated? (E2E tests, manual review, comparison with previous results?)
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Antares release notes reviewed for GEMS Language-relevant changes
        - [ ] GEMS Language documentation updated for affected features
        - [ ] Quick Start Examples updated and verified
        - [ ] E2E tests pass against new Antares binary
        - [ ] `versions/antares-simulator.txt` updated to new version
        - [ ] `versions/gems-language.txt` bumped (minor or patch as applicable)
        - [ ] `CHANGELOG-gems-language.md` entry added
        - [ ] `COMPATIBILITY.md` updated with new version mapping
        - [ ] PR reviewed alongside documentation changes
