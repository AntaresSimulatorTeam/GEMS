name: "LT-03 — New library or taxonomy"
description: Track the design, implementation, and validation of a new GEMS model library or taxonomy
title: "[LT-03] New library: "
labels: ["LT-03"]
body:
  - type: markdown
    attributes:
      value: |
        **Process LT-03** — Triggered when a new modeling domain or taxonomy needs to be added to the GEMS ecosystem. Requires a design phase, proof-of-concept study, and full E2E validation before merge.

  - type: input
    id: library_name
    attributes:
      label: Library / Taxonomy Name
      description: Proposed identifier (lowercase with underscores), e.g. `battery_models`
      placeholder: "e.g. battery_models"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What modeling domain or use case does this library address? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: design_overview
    attributes:
      label: Design Overview
      description: |
        Describe the intended structure:
        - Port types and fields
        - Models (names, parameters, variables, constraints)
        - Connections to existing libraries (if any)
    validations:
      required: true

  - type: textarea
    id: poc_study
    attributes:
      label: Proof-of-Concept Study Plan
      description: |
        Describe the PoC study that will validate the library:
        - Study location in `resources/e2e_studies/`
        - What scenario it models
        - Expected validation approach (compare to reference results or analytical solution)
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: |
        Which Antares-Simulator/Modeler version is this library targeting?
        Any dependencies on GemsPy or other ecosystem components?

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Library design reviewed and approved
        - [ ] Library YAML created (`libraries/<name>.yml`)
        - [ ] Port types defined with all required fields
        - [ ] All models defined (parameters, variables, constraints, port-field-definitions)
        - [ ] Mathematical expressions validated (expression syntax tests pass)
        - [ ] Proof-of-concept study created (`resources/e2e_studies/`)
        - [ ] E2E validation passes for PoC study
        - [ ] YAML validation tests pass (`tests/validation_tests/`)
        - [ ] Version file created (`versions/<name>.txt`, starting at `1.0.0`)
        - [ ] Changelog file created (`libraries/CHANGELOG-<name>.md`)
        - [ ] `COMPATIBILITY.md` updated with new library entry
        - [ ] Documentation added covering models, parameters, and usage examples
        - [ ] PR reviewed alongside documentation changes
