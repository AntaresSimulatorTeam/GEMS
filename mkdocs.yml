          - Antares Simulator's GEMS Interpreter: getting-started/installation/modeler-installation.md
          - GemsPy: getting-started/installation/gemspy-installation.md
      - Quick Start Examples:
          - Three-bus system - Simple Adequacy Example:
              - Overview: getting-started/quick-start/adequacy-overview.md
              - Mathematical Formulation: getting-started/quick-start/adequacy-math-model.md
          - Unit Commitment Example: getting-started/quick-start/unit-commitment.md
          - PyPSA-Eur in GEMS format: getting-started/quick-start/pypsa-eur.md
  - User Guide:
      - Introduction: user-guide/introduction.md
      - GEMS Syntax: user-guide/syntax.md
      - File Structure:
          - Overview: user-guide/file-structure/overview.md
          - Library File: user-guide/file-structure/library.md
          - System File: user-guide/file-structure/system.md
          - Dataseries File: user-guide/file-structure/data-series.md
          - Scenario Builder File: user-guide/file-structure/scenario-builder.md
          - Solver parameters and optimization configuration files: user-guide/file-structure/solver-optimization.md
          - Taxonomy File: user-guide/file-structure/taxonomy.md
          - Business Views configuration files: user-guide/file-structure/business-view-configuration.md
      - Theoretical Concepts:
          - Optimization Problem: user-guide/theoretical-concepts/optimization-problem.md
      - Outputs:
          - Simulation Table: user-guide/outputs/simulation-table.md
          - Optimization Problem Files: user-guide/outputs/optimization-problem-files.md
          - Business View: user-guide/outputs/business-view.md
  - Interoperability:
      - PyPSA to GEMS Converter:
          - Overview: interoperability/pypsa-to-gems-converter/overview.md
          - How the Converter Works: interoperability/pypsa-to-gems-converter/how-the-converter-works.md
          - Input and Output of the Converter: interoperability/pypsa-to-gems-converter/input-and-output.md
          - Current Limitations of the Converter: interoperability/pypsa-to-gems-converter/current-limitations.md
          - Step-by-Step Guide Manually Executing a Simulation in GEMS Modeler: interoperability/pypsa-to-gems-converter/step-by-step-guide.md
          - Comparing Results Between GEMS Modeler and PyPSA: interoperability/pypsa-to-gems-converter/comparing-results.md
