docs_dir: doc
repo_name: GEMS
repo_name: GEMS
exclude_docs: |
  documentation_env/
  examples/notebooks/tutorial-two-pypsa-eur/pypsa-eur/*
  examples/notebooks/tutorial-two-pypsa-eur/tutorial_pypsa_eur.ipynb
site_name: GEMS - Generic Energy system Modelling Schema
site_url: https://gems-energy.readthedocs.io/en/latest/
site_description: "GEMS (Generic Energy system Modelling Schema) is a
  graph-based algebraic modelling language for defining and solving energy
  system optimisation problems."
site_author: "Antares Simulator Team - RTE"
copyright: "Copyright &copy; 2026 RTE"
repo_url: https://github.com/AntaresSimulatorTeam/GEMS
edit_uri: edit/doc/doc/

theme:
  name: material
  logo: assets/0_gems_favicon.png
  favicon: assets/0_gems_favicon.png
  prev_next_buttons_location: none
  features:
    - navigation.instant
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - content.action.copy
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ""
      emoji_generator:

        !!python/name:material.extensions.emoji.to_svg ""
hooks:
  # Converts libraries/*.yml -> doc/assets/data/*.json before each build.
  - doc/hooks/yaml_to_json.py

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # yaml-loader.js uses JSON.parse() natively.
  - javascripts/yaml-loader.js

extra_css:
  - stylesheets/yaml-loader.css

plugins:
  - mkdocs-jupyter:
      execute: true
      include: ["*.ipynb"]
      allow_errors: false
      include_source: true
      remove_tag_config:
        remove_input_tags:
        - hide-cell
  - search
  - macros:
      module_name: main
  - git-revision-date-localized:
      exclude:
        - documentation_env/*
        - examples/notebooks/tutorial-two-pypsa-eur/pypsa-eur/*
      enable_creation_date: true
      enable_git_follow: true
      type: timeago
      timezone: Europe/Paris
      fallback_to_build_date: true

nav:
  - Home:
      - Home: index.md
      - Key Principles: home/key-principles.md
      - Use Cases: home/use-cases.md
      - Users of GEMS: home/users.md
      - Release Notes: home/release-notes.md
  - Overview:
      - Architecture: overview/architecture.md
      - Glossary: overview/glossary.md
      - File Structure: overview/file-structure.md
      - Difference with other languages & tools: overview/difference-with-other-languages.md
      - GEMS Interpreters:
          - GemsPy: overview/gems-interpreters/gemspy.md
          - Antares Simulator: overview/gems-interpreters/antares-simulator.md
      - Reference libraries & taxonomies of models:
          - Libraries of models: overview/references/libraries.md
          - Verifying GEMS Libraries: overview/references/verifying-libraries.md
          - Classification of models: overview/references/classification.md
  - Getting Started:
