taxonomy:
  id: my_taxonomy
  description: "GEMS taxonomy configuration. This is an example to illustrate the data structure of a taxonomy configuration file. It is not meant to be used as is.

  categories:

    - id: balance
      ports:
        - id: balance_port
      constraints:
        - id: balance
      extra-outputs:
        - id: price
      properties:
        - id: carrier

    - id: production
      
      parameters:
        - id: p_min
        - id: p_max
        - id: generation_cost
      ports:
        - id: balance_port
      properties:
        - id: carrier
        - id: technology
      extra-outputs:
        - id: up_margin
        - id: down_margin

    - id: dispatchable_production
      parent-category: production
      variables: # just an example of how to use variables in a category
        - id: generation

    - id: fatal_production
      parent-category: production
      parameters:
        - id: generation

    - id: consumption
      ports:
        - id: balance_port
      properties:
        - id: carrier

    - id: fatal_consumption
      parent-category: consumption     

    - id: flexible_consumption
      parent-category: consumption
      parameters:
        - id: min_load
        - id: max_load
      

    - id: storage
      

    - id: link

    - id: converter

    - id: coupling_models

    - id: capacity_investment_decisions
      ports:
        - id: capacity_port