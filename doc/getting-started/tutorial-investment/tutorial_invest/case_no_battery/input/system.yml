system:
  id: investment_study_case1
  model-libraries: investment_library

  components:

    - id: node
      model: investment_library.bus
      parameters:
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value: 1               # €/MWh - low penalty for excess generation
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value: 10000           # €/MWh - high penalty to drive investment

    - id: load
      model: investment_library.load
      parameters:
        - id: load
          time-dependent: true
          scenario-dependent: true
          value: load_demand     # references data-series/load_demand.csv

    - id: thermal_existing
      model: investment_library.generator
      parameters:
        - id: p_min
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: p_max
          time-dependent: false
          scenario-dependent: false
          value: 100             # MW - intentionally undersized
        - id: generation_cost
          time-dependent: false
          scenario-dependent: false
          value: 30              # €/MWh
        - id: co2_emission_factor
          time-dependent: false
          scenario-dependent: false
          value: 0

    - id: renewable
      model: investment_library.renewable
      parameters:
        - id: generation
          time-dependent: true
          scenario-dependent: true
          value: renewable_gen

    - id: candidate_thermal
      model: investment_library.candidate_generator
      parameters:
        - id: investment_cost
          time-dependent: false
          scenario-dependent: false
          value: 250             # €/MW - the parameter investment_cost is a daily value (if the time horizon for the problems is one day) derivated from annual payments
                                 # using €250/MW.day corresponds to €91,250/MW.year
        - id: generation_cost
          time-dependent: false
          scenario-dependent: false
          value: 50              # €/MWh - more expensive than existing thermal

  connections:
    - component1: node
      component2: load
      port1: balance_port
      port2: balance_port
    - component1: node
      component2: thermal_existing
      port1: balance_port
      port2: balance_port
    - component1: node
      component2: renewable
      port1: balance_port
      port2: balance_port
    - component1: node
      component2: candidate_thermal
      port1: balance_port
      port2: balance_port
